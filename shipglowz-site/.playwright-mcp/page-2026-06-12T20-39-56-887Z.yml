        - article [ref=e68]:
          - generic [ref=e69]: "01"
          - heading "Cadrer le travail avant le départ de l’agent" [level=3] [ref=e70]
          - paragraph [ref=e71]: Transformer une demande floue en contexte, périmètre, critères d’acceptation et contraintes réellement suivables.
        - article [ref=e72]:
          - generic [ref=e73]: "02"
          - heading "Choisir le chemin professionnel avant l’édition" [level=3] [ref=e74]
          - paragraph [ref=e75]: Donner à l’agent la carte du dépôt, les contrats actifs, le niveau d’exigence, les docs pertinentes et les commandes opérationnelles avant qu’il modifie les fichiers.
        - article [ref=e76]:
          - generic [ref=e77]: "03"
          - heading "Vérifier face à la promesse et au niveau d’exigence" [level=3] [ref=e78]
          - paragraph [ref=e79]: Contrôler le comportement, les docs, les claims publics, les cas limites, la posture sécurité et l’impact workflow avant de considérer le changement terminé.
        - article [ref=e80]:
          - generic [ref=e81]: "04"
          - heading "Livrer avec l’état serveur toujours visible" [level=3] [ref=e82]
          - paragraph [ref=e83]: Garder les environnements, processus, tunnels, publications, états de santé et logs assez proches du workflow agent pour agir dessus.
