    - generic [ref=e41]:
      - generic [ref=e42]:
        - paragraph [ref=e43]: Pourquoi ShipFlow existe
        - heading "Le problème n’est plus de taper du code. C’est de diriger le système autour." [level=2] [ref=e44]
        - paragraph [ref=e45]: L’IA peut échafauder rapidement les parties faciles. Le plus difficile est de décider ce qui mérite une solution professionnelle, de fournir le bon contexte, de détecter les dérives et de garder le chemin de déploiement relié à la promesse faite.
      - generic [ref=e46]:
        - article [ref=e47]:
          - heading "Le contexte devient une infrastructure" [level=3] [ref=e48]
          - paragraph [ref=e49]: Un nouveau fil reçoit un point d’entrée, une carte opérationnelle et des contrats explicites au lieu de reconstruire la même histoire de mémoire.
        - article [ref=e50]:
          - heading "La planification précède le prompt" [level=3] [ref=e51]
          - paragraph [ref=e52]: Les specs, les vérifications de préparation et les limites de tâche transforment une demande floue en travail exécutable sans deviner le produit.
        - article [ref=e53]:
          - heading "La qualité passe avant le chemin le plus court" [level=3] [ref=e54]
          - paragraph [ref=e55]: Le choix du modèle, le routage, l’implémentation et la vérification optimisent la correction, la sécurité, la maintenabilité, la performance utile et la preuve avant la vitesse ou la commodité.
        - article [ref=e56]:
          - heading "La revue a quelque chose à tester" [level=3] [ref=e57]
          - paragraph [ref=e58]: La vérification n’est pas de l’optimisme après un build vert. Elle contrôle le comportement, les docs et les dérives de contrat face à ce que le travail devait changer.
        - article [ref=e59]:
          - heading "Le chemin serveur reste dans la boucle" [level=3] [ref=e60]
          - paragraph [ref=e61]: "ShipFlow garde aussi la réalité opérationnelle visible : environnements, processus, tunnels, publication, santé et état serveur autour de la livraison réelle."
    - generic [ref=e62]:
      - generic [ref=e63]:
        - paragraph [ref=e64]: La boucle agent
        - heading "ShipFlow couvre le travail autour de l’agent, pas seulement le prompt envoyé." [level=2] [ref=e65]
        - paragraph [ref=e66]: La question utile n’est pas de savoir si l’IA peut écrire du code. Elle le peut. La question utile est de savoir si votre système peut diriger, inspecter, exécuter et expliquer ce travail sans récompenser le chemin fragile le plus rapide.
