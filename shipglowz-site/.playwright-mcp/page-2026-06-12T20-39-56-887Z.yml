    - generic [ref=e15]:
      - generic [ref=e16]:
        - paragraph [ref=e17]: Pour les fondateurs solo qui livrent avec des agents
        - heading "L’IA a accéléré la construction. Elle a aussi rendu les mauvais passages de relais plus coûteux." [level=1] [ref=e18]
        - paragraph [ref=e19]: ShipFlow donne à chaque exécution d’agent une carte de contexte, un contrat de tâche, un niveau d’exigence, des portes de vérification et les contrôles serveur nécessaires pour livrer de vrais projets. Le but n’est pas de faire aller les agents plus vite à tout prix. Le but est d’arrêter de confier du travail sérieux à un fil vide en espérant qu’il reconstruise correctement le système.
        - list [ref=e20]:
          - listitem [ref=e21]: les nouveaux agents partent d’une carte connue, pas de résidus de chat
          - listitem [ref=e22]: le travail non trivial est cadré avant le code
          - listitem [ref=e23]: les raccourcis passent après la correction, la sécurité, la maintenabilité et la preuve
