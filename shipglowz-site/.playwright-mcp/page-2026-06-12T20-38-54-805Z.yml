        - paragraph [ref=e43]: Why ShipFlow Exists
        - heading "The problem is no longer typing code. It is directing the system around it." [level=2] [ref=e44]
        - paragraph [ref=e45]: AI can scaffold the easy parts quickly. The hard part is deciding what deserves a professional solution, feeding the right context, catching drift, and keeping the deployment path connected to the promise you made.
      - generic [ref=e46]:
        - article [ref=e47]:
          - heading "Context becomes infrastructure" [level=3] [ref=e48]
          - paragraph [ref=e49]: A fresh thread gets a point of entry, an operational map, and explicit contracts instead of rebuilding the same story from memory.
        - article [ref=e50]:
          - heading "Planning happens before prompting" [level=3] [ref=e51]
          - paragraph [ref=e52]: Specs, readiness checks, and task boundaries turn a loose request into work an agent can execute without guessing the product.
        - article [ref=e53]:
          - heading "Quality beats the shortest path" [level=3] [ref=e54]
          - paragraph [ref=e55]: Model choice, routing, implementation, and verification optimize for correctness, security, maintainability, relevant performance, and proof before speed or convenience.
        - article [ref=e56]:
          - heading "Review has something to test against" [level=3] [ref=e57]
          - paragraph [ref=e58]: Verification is not optimism after a green build. It checks behavior, docs, and contract drift against what the work was supposed to change.
        - article [ref=e59]:
          - heading "The server path stays in the loop" [level=3] [ref=e60]
          - paragraph [ref=e61]: "ShipFlow also keeps operational reality visible: environments, processes, tunnels, publishing, health, and the server state around real delivery."
